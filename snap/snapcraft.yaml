name: system-glancer
base: core22
version: '1.0.1'
title: System Glancer
summary: Glances-inspired system monitor for Ubuntu
description: |
  Desktop system monitor showing live CPU, memory, disk, network,
  process, and temperature metrics for Ubuntu machines.
license: Apache-2.0
contact: serhii.kaminskyi@ukr.net
issues: https://github.com/happy-coder-ua/system-glancer/issues
source-code: https://github.com/happy-coder-ua/system-glancer
website: https://github.com/happy-coder-ua/system-glancer
grade: stable
confinement: strict

architectures:
  - build-on: amd64

parts:
  system-glancer:
    plugin: nil
    source: .
    build-snaps:
      - node/22/stable
    build-packages:
      - python3
      - make
      - g++
      - libx11-dev
      - libxkbfile-dev
    override-build: |
      export NPM_CONFIG_LOGLEVEL=error
      export NPM_CONFIG_UPDATE_NOTIFIER=false
      export NPM_CONFIG_FUND=false
      export NPM_CONFIG_AUDIT=false
      npm ci

      # Build frontend and electron code (skip electron-builder — npm ls broken in snap)
      npx tsc
      npx vite build

      # Assemble electron app manually from npm electron dist
      ELECTRON_DIST="node_modules/electron/dist"
      APP_DIR="release/linux-unpacked"

      mkdir -p "$APP_DIR/resources/app"
      cp -r "$ELECTRON_DIST"/. "$APP_DIR"/
      mv "$APP_DIR/electron" "$APP_DIR/system-glancer"

      cp package.json "$APP_DIR/resources/app/"
      cp -r dist "$APP_DIR/resources/app/"
      cp -r dist-electron "$APP_DIR/resources/app/"

      mkdir -p $SNAPCRAFT_PART_INSTALL/opt/system-glancer
      cp -r release/linux-unpacked/. $SNAPCRAFT_PART_INSTALL/opt/system-glancer/
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/applications
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/512x512/apps
      cp build/icon.png $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/512x512/apps/system-glancer.png

apps:
  system-glancer:
    command: opt/system-glancer/system-glancer --no-sandbox --disable-gpu-sandbox
    extensions: [gnome]
    environment:
      DISABLE_WAYLAND: "1"
      GTK_USE_PORTAL: "0"
    plugs:
      - home
      - network
      - network-observe
      - hardware-observe
      - mount-observe
      - system-observe
      - process-control
      - browser-support
      - opengl
      - audio-playback
